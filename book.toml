[book]
title = "Lykn"
authors = ["Duncan McGreggor"]
description = "And Now for Something Completely Parenthetical — A Lisp Flavoured JavaScript"
language = "en"

[build]
build-dir = "book"

[preprocessor.index]

[preprocessor.links]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
default-theme = "lfe-pdp"
preferred-dark-theme = "lfe-pdp"
additional-js = ["js/mermaid.min.js", "js/mermaid-init.js"]
additional-css = ["css/custom.css"]
git-repository-url = "https://github.com/cnbbooks/lykn"

[output.html.search]
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 2

[output.html.fold]
enable = true
